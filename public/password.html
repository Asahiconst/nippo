<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>パスワード変更 - 日報システム</title>
<link rel="stylesheet" href="/shared/style.css">
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div id="header-area"></div>
<div id="contents" style="max-width:820px; margin:0 auto;">
<section id="view-pw-change">
  <h2 class="page-title">パスワード変更</h2>
  <div style="max-width:380px;">
    <div class="err" id="pw-err"></div>
    <div class="form-group"><label>現在のパスワード</label><input type="password" id="pw-current"></div>
    <div class="form-group"><label>新しいパスワード</label><input type="password" id="pw-new"></div>
    <div class="form-group"><label>新しいパスワード（確認）</label><input type="password" id="pw-confirm"></div>
    <button class="btn" id="btn-change">変更する</button>
    <button class="btn-back" style="margin-left:8px;" onclick="location.href='/top.html'">キャンセル</button>
  </div>
</section>
</div>
<script src="/shared/app.js"></script>
<script>
(async function () {
  const user = await App.requireAuth('password');
  if (!user) return;

  document.getElementById('btn-change').addEventListener('click', async () => {
    const cur = document.getElementById('pw-current').value;
    const next = document.getElementById('pw-new').value;
    const conf = document.getElementById('pw-confirm').value;
    const err = document.getElementById('pw-err');
    err.textContent = '';
    if (!cur || !next) { err.textContent = 'すべての項目を入力してください。'; return; }
    if (next !== conf) { err.textContent = '新しいパスワードが一致しません。'; return; }
    App.loading(true);
    try {
      const res = await App.api('change-password', { method: 'POST', body: { oldPassword: cur, newPassword: next } });
      if (res.success) { App.toast('パスワードを変更しました。'); location.href = '/top.html'; }
      else err.textContent = res.message || '変更に失敗しました。';
    } catch (e) {
      err.textContent = '通信エラーが発生しました。';
    } finally { App.loading(false); }
  });
})();
</script>
</body>
</html>
